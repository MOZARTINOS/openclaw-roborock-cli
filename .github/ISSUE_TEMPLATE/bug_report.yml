name: Bug report
description: Report an issue with command behavior, setup, or documentation.
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough detail to reproduce the issue.

  - type: input
    id: command
    attributes:
      label: Command used
      placeholder: roborock-cli status
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or traceback
      description: Redact tokens, local keys, and personal data.
      render: shell

  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: Windows 11, Python 3.11, Roborock S8
    validations:
      required: true
